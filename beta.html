<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地底迷宮機率計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #ffffff; }
        .glass-morphism { background: #ffffff; border: 1px solid #e5e7eb; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .result-scroll::-webkit-scrollbar { width: 6px; }
        .result-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .result-scroll::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 md:p-8">
    <div class="glass-morphism w-full max-w-4xl rounded-3xl shadow-lg overflow-hidden border border-gray-200">
        <div class="md:flex">
            <div class="md:w-1/2 p-6 md:p-10 bg-white/50 border-b md:border-b-0 md:border-r border-gray-200">
                <header class="mb-8">
                    <h1 class="text-3xl font-extrabold text-gray-900 flex items-center gap-2">地底迷宮計算機</h1>
                </header>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-3">選擇計算模式</label>
                        <div class="relative">
                            <select id="mode-select" class="w-full p-4 bg-white border-2 border-gray-200 rounded-xl appearance-none focus:border-indigo-600 focus:ring-0 text-gray-900 font-medium cursor-pointer">
                                <option value="1">預測抵達樓層</option>
                                <option value="2">檢測我的運氣</option>
                                <option value="3">樓層消耗查詢</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div id="input-container" class="grid grid-cols-1 gap-4"></div>
                    <button id="calculate-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center gap-2">
                        開始計算
                    </button>
                </div>
            </div>
            <div class="md:w-1/2 p-6 md:p-10 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800">計算結果</h2>
                    <button id="view-toggle" class="hidden text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition-colors">
                        📈 切換圖表
                    </button>
                </div>
                
                <div class="relative flex-grow">
                    <div id="results" class="result-scroll overflow-y-auto space-y-4 max-h-[500px] pr-2">
                        <div class="text-center py-20">
                            <div class="text-4xl mb-4">📊</div>
                            <p class="text-gray-400">尚無計算結果</p>
                        </div>
                    </div>
                    <div id="chart-container" class="hidden w-full h-[400px]">
                        <canvas id="resultChart"></canvas>
                    </div>
                </div>

                <footer class="mt-8 pt-6 border-t border-gray-100">
                    <div class="flex items-center justify-between text-xs text-gray-400">
                        <p>Developed by internet cafe</p>
                        <a href="https://github.com/KEVIN970712/GrandAbyss_Calculator" target="_blank" class="flex items-center gap-1">View on GitHub</a>
                    </div>
                </footer>
            </div>
        </div>
    </div>

    <script>
        const MAX_FLOOR = 100;
        const MIN_TRAP = 10;
        const MIN_DISPLAY = 0.00005;
        const WEIGHTS = [{d: 2, w: 1/5}, {d: 1, w: 1/3}, {d: 0, w: 1/3}, {d: -1, w: 1/7.5}];

        const inputs = {
            startfloor: { label: '目前樓層', placeholder: '0' },
            catCount: { label: '剩餘角色總數', placeholder: '10' },
            predictedLosses: { label: '預計後續敗場', placeholder: '0' },
            totalLosses: { label: '累積敗場(含中途退出)', placeholder: '0' },
            targetFloor: { label: '目標查詢樓層', placeholder: '100' }
        };

        const modeMap = { '1': ['startfloor', 'catCount', 'predictedLosses'], '2': ['catCount', 'totalLosses'], '3': ['targetFloor'] };

        let myChart = null;
        let chartData = { labels: [], values: [] };

        function renderInputs() {
            const mode = document.getElementById('mode-select').value;
            document.getElementById('input-container').innerHTML = modeMap[mode].map(key => `
                <div class="relative">
                    <label class="text-xs font-bold text-gray-500 absolute -top-2 left-3 bg-white px-1 z-10">${inputs[key].label}</label>
                    <div class="flex items-center border-2 border-gray-200 rounded-xl overflow-hidden focus-within:border-indigo-500 bg-white">
                        <input type="number" id="${key}" value="${inputs[key].placeholder}" class="w-full p-3 outline-none text-gray-800 font-medium">
                    </div>
                </div>
            `).join('');
        }

        function getAvgLoss(f) {
            if (f % 10 === 0 || f === 99) return 8;
            if (f < 30) return 4;
            if (f < 60) return 5;
            return 6;
        }

        function createItem(t, v, c = "text-indigo-600") {
            return `<div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center"><span class="text-gray-600 font-medium">${t}</span><span class="font-bold ${c}">${v}</span></div>`;
        }

        function updateChart() {
            const ctx = document.getElementById('resultChart');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.labels,
                    datasets: [{
                        label: '機率 (%)',
                        data: chartData.values,
                        borderColor: '#4f46e5',
                        backgroundColor: 'rgba(79, 70, 229, 0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            displayColors: false,
                            callbacks: {
                                label: function(context){
                                    let value = context.parsed.y;
                                    return `機率：${value}%`;
                                }
                            }        
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { callback: v => v + '%' } }
                    }
                }
            });
        }

        document.getElementById('view-toggle').addEventListener('click', function() {
            const results = document.getElementById('results');
            const container = document.getElementById('chart-container');
            const isChart = results.classList.contains('hidden');
            if (isChart) {
                results.classList.remove('hidden');
                container.classList.add('hidden');
                this.innerText = '📈 切換圖表';
            } else {
                results.classList.add('hidden');
                container.classList.remove('hidden');
                this.innerText = '📋 切換清單';
                updateChart();
            }
        });

        document.getElementById('mode-select').addEventListener('change', renderInputs);

        document.getElementById('calculate-btn').addEventListener('click', () => {
            const mode = document.getElementById('mode-select').value;
            const resDiv = document.getElementById('results');
            resDiv.innerHTML = '';
            chartData = { labels: [], values: [] };

            let start = 0, initialCats = 0, targetVal = 0;
            if (mode === '1') {
                start = parseInt(document.getElementById('startfloor').value) || 0;
                initialCats = (parseInt(document.getElementById('catCount').value) || 0) - 2 * (parseInt(document.getElementById('predictedLosses').value) || 0);
            } else if (mode === '2') {
                initialCats = (parseInt(document.getElementById('catCount').value) || 0) - 2 * (parseInt(document.getElementById('totalLosses').value) || 0);
            } else if (mode === '3') {
                targetVal = parseInt(document.getElementById('targetFloor').value) || 0;
                initialCats = 10;
                if (targetVal <= 0 || targetVal > MAX_FLOOR) return resDiv.innerHTML = createItem('錯誤', '請輸入 1-100', 'text-red-500');
            }

            if (mode !== '3' && initialCats < MIN_TRAP) {
                resDiv.innerHTML = createItem(`${start}層`, '100.0000%');
                return;
            }

            let currentDist = new Map();
            currentDist.set(initialCats, 100.0);

            let resultsHTML = '';
            const loopStart = mode === '3' ? 1 : start + 1;

            for (let i = loopStart; i <= MAX_FLOOR; i++) {
                let nextDist = new Map();
                const avg = getAvgLoss(i);
                
                for (let [s, p] of currentDist) {
                    if (mode !== '3') {
                        if (s < MIN_TRAP) continue;
                        for (let g of WEIGHTS) {
                            let ns = s - avg + g.d;
                            nextDist.set(ns, (nextDist.get(ns) || 0) + p * g.w);
                        }
                    } else {
                        for (let g of WEIGHTS) {
                            let ns = s + avg - g.d;
                            nextDist.set(ns, (nextDist.get(ns) || 0) + p * g.w);
                        }
                    }
                }

                if (mode !== '3') {
                    let fail = 0;
                    if (i !== MAX_FLOOR) {
                        for (let [s, p] of nextDist) if (s < MIN_TRAP) fail += p;
                    } else {
                        for (let [s, p] of nextDist) fail += p;
                    }
                    if (fail > MIN_DISPLAY) {
                        const valStr = fail.toFixed(4);
                        resultsHTML += createItem(`${i} 層`, `${valStr}%`);
                        chartData.labels.push(`${i}F`);
                        chartData.values.push(valStr);
                    }
                }

                if (mode === '3' && i === targetVal - 1) {
                    const sorted = Array.from(nextDist.entries()).sort((a, b) => a[0] - b[0]);
                    for (let [s, p] of sorted) {
                        if (p > MIN_DISPLAY) {
                            const valStr = p.toFixed(4);
                            resultsHTML += createItem(`${s} 貓`, `${valStr}%`);
                            chartData.labels.push(`${s}貓`);
                            chartData.values.push(valStr);
                        }
                    }
                    break;
                }
                currentDist = nextDist;
                if (currentDist.size === 0) break;
            }

            const toggleBtn = document.getElementById('view-toggle');
            if (resultsHTML) {
                toggleBtn.classList.remove('hidden');
                if (!document.getElementById('chart-container').classList.contains('hidden')) updateChart();
            } else {
                toggleBtn.classList.add('hidden');
            }
            resDiv.innerHTML = resultsHTML || '<div class="text-center py-20 text-gray-400">尚無計算結果</div>';
        });
        renderInputs();
    </script>
</body>
</html>
